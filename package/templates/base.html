<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ title or "Ben Rice" }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header class="site-header">
        <div class="container nav-container">
            <a class="site-name" href="/">Ben Rice</a>

            <nav class="site-nav">
                <a href="/" class="{{ 'active' if active_page == 'home' else '' }}">Home</a>
                <a href="/about" class="{{ 'active' if active_page == 'about' else '' }}">About</a>
                <a href="/projects" class="{{ 'active' if active_page == 'projects' else '' }}">Projects</a>
                <a href="/contact" class="{{ 'active' if active_page == 'contact' else '' }}">Contact</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; {{ 2026 }} Ben Rice</p>
        </div>
    </footer>
</body>
</html>
